name: Bug report
description: Report a reproducible problem in Abyssal Planet
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: mod-version
    attributes:
      label: Abyssal Planet version
      placeholder: "0.1.2"
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge and GeckoLib versions
      placeholder: "Forge 47.4.20, GeckoLib 4.8.4"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Singleplayer
        - LAN
        - Dedicated server
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Enter the Abyss..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report
      description: Drag and drop the relevant log file here.
